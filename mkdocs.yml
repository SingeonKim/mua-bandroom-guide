site_name: 스포렉스 합주실 PA 안내
site_description: 스포렉스 합주실 PA·모니터 세팅 가이드
site_url: https://SingeonKim.github.io/mua-bandroom-guide/
docs_dir: docs

theme:
  name: material
  language: ko
  icon:
    logo: material/speaker
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 다크 모드로
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로
  features:
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.tooltips
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

# 설계·plan 문서는 docs_dir 아래 있어도 사이트 빌드에서 제외
exclude_docs: |
  superpowers/

nav:
  - 홈: index.md
  - 사용 가이드: guide.md
  - 스펙 문서(관리자용): spec.md
